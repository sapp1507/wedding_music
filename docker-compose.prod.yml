services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - wedding_music

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.server}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      PUBLIC_ADMIN_URL: ${PUBLIC_URL}/admin/
    command: gunicorn config.wsgi:application --bind 0.0.0.0:${BACKEND_PORT:-8000} --workers ${GUNICORN_WORKERS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wedding_music

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
    ports:
      - "${APP_HOST:-0.0.0.0}:${APP_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - wedding_music

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-wedding_music}_postgres_data

networks:
  wedding_music:
    name: ${COMPOSE_PROJECT_NAME:-wedding_music}_network
